    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&display=swap');

        :root {
            --glitch-color: #ff0000;
            --primary: #d1d1d1;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'JetBrains+Mono', monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* Тот самый иммерсивный фон */
        .viewport-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png'), 
                        radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            opacity: 0.4;
            z-index: -1;
        }

        /* CRT Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* Glitch Animation */
        .glitch {
            position: relative;
            display: inline-block;
        }

        .glitch::after {
            content: attr(data-text);
            position: absolute;
            left: 2px;
            text-shadow: -1px 0 red;
            top: 0;
            background: var(--bg);
            overflow: hidden;
            clip: rect(0, 900px, 0, 0);
            animation: noise-anim 2s infinite linear alternate-reverse;
        }

        @keyframes noise-anim {
            0% { clip: rect(10px, 9999px, 20px, 0); }
            100% { clip: rect(80px, 9999px, 90px, 0); }
        }

        .terminal-window {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .scan-line {
            width: 100%;
            height: 100px;
            z-index: 99;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { bottom: 100%; }
            100% { bottom: -100%; }
        }

        .sidebar-link:hover {
            background: #1a1a1a;
            color: #fff;
            padding-left: 1.5rem;
            transition: all 0.3s ease;
        }

        .morse-block {
            word-break: break-all;
            letter-spacing: 2px;
            line-height: 1.8;
            opacity: 0.7;
        }
    </style>
</head>
